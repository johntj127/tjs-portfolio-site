<!DOCTYPE html>
<!-- SMW Portfolio Map — 16:9 viewBox, square pixels, Yoshi's Island composition -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:
      repeating-linear-gradient(180deg,
        transparent 0px, transparent 28px,
        rgba(120,170,255,0.10) 28px, rgba(120,170,255,0.10) 30px),
      linear-gradient(160deg, #2050c8 0%, #3868e0 40%, #2050c8 100%);
    width:100vw; height:100vh; overflow:hidden;
  }
  #map { position:absolute; inset:0; width:100%; height:100%; }
</style>
</head>
<body>
<!-- viewBox 0 0 178 100 matches 16:9 → 1 SVG unit ≈ 8.1px wide ≈ 9px tall (nearly square).
     No ry compensation needed. Node x positions = nodeConfig.x * 1.78 -->
<svg id="map" viewBox="0 0 178 100" preserveAspectRatio="none"></svg>
<script>
const NS = 'http://www.w3.org/2000/svg'
const svg = document.getElementById('map')
let _uid = 0
const uid = () => 'u' + (_uid++)
function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag)
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v)
  ;(parent||svg).appendChild(e)
  return e
}
const defs = el('defs',{})

/* ─── HILL: bullet/tombstone, straight sides + round cap ─────────────── */
function hill(cx, gY, rx, sh) {
  const ry = rx * 0.92   // nearly square pixels; slight y-bias keeps cap round
  const id = uid()
  const d = `M ${cx-rx},${gY} L ${cx-rx},${gY-sh} A ${rx},${ry},0,0,1,${cx+rx},${gY-sh} L ${cx+rx},${gY} Z`
  const cp = el('clipPath',{id},defs); el('path',{d},cp)
  el('ellipse',{cx:cx+rx*.08,cy:gY+.7,rx:rx*1.22,ry:ry*.13,fill:'#0a2002',opacity:'.38'})
  el('path',{d,fill:'#62c018',stroke:'#1a4406','stroke-width':'.48','stroke-linejoin':'round'})
  el('path',{
    d:`M ${cx+rx*.28},${gY} L ${cx+rx*.28},${gY-sh} A ${rx*.72},${ry*.72},0,0,1,${cx+rx},${gY-sh} L ${cx+rx},${gY} Z`,
    fill:'#3a8010','clip-path':`url(#${id})`
  })
  el('rect',{x:cx-rx,y:gY-sh-ry-1,width:rx*.56,height:sh+ry+1,fill:'#90e030','clip-path':`url(#${id})`})
  el('ellipse',{cx:cx-rx*.16,cy:gY-sh-ry*.70,rx:rx*.20,ry:ry*.18,fill:'rgba(255,255,255,.22)','clip-path':`url(#${id})`})
}

/* ─── TREE: SMW style — dark near-black blob, barely-visible stub trunk ─ */
/* SMW trees: near-black dark green sphere, lighter outline rim, highlight
   crescent upper-left. Trunk is a tiny brown nub — mostly hidden by canopy.
   No decorations. Canopy is the whole tree visually.                       */
function tree(cx, gY, r) {
  const tH = r * 0.20          // nearly invisible stub trunk
  const tW = r * 0.55          // narrow nub
  const bY = gY - tH - r * 0.85  // canopy overlaps slightly into trunk

  // Drop shadow
  el('ellipse',{cx:cx+r*.12,cy:gY+.3,rx:r*.95,ry:r*.20,fill:'#040c01',opacity:'.35'})
  // Trunk nub (mostly hidden under canopy)
  el('rect',{x:cx-tW/2,y:gY-tH,width:tW,height:tH+.1,fill:'#6a3010',stroke:'#2e1208','stroke-width':'.22'})
  // Outer lighter rim (gives the circular outline)
  el('circle',{cx,cy:bY,r:r,fill:'#3a7c10',stroke:'#1a4406','stroke-width':'.30'})
  // Main dark body
  el('circle',{cx,cy:bY,r:r*.84,fill:'#1c4a06'})
  // Highlight crescent — subtle upper-left, not too bright
  el('ellipse',{cx:cx-r*.28,cy:bY-r*.28,rx:r*.30,ry:r*.22,fill:'rgba(80,150,20,0.38)'})
  // Small glint dot
  el('circle',{cx:cx-r*.32,cy:bY-r*.35,r:r*.07,fill:'rgba(160,220,80,0.45)'})
}

/* ─── HOUSE ──────────────────────────────────────────────────────────── */
function house(cx, gY) {
  el('rect',{x:cx-3.8,y:gY-4.2,width:7.6,height:4.5,fill:'#e8cc88',stroke:'#5a3010','stroke-width':'.44'})
  el('polygon',{points:`${cx-4.5},${gY-4.2} ${cx},${gY-8.5} ${cx+4.5},${gY-4.2}`,fill:'#c03820',stroke:'#5a1008','stroke-width':'.44'})
  el('rect',{x:cx-1.0,y:gY-2.4,width:2.0,height:2.4,fill:'#8a5020',stroke:'#3a1e08','stroke-width':'.28'})
  el('rect',{x:cx+.5,y:gY-8.8,width:.6,height:1.5,fill:'#8a5020',stroke:'#3a1e08','stroke-width':'.22'})   // chimney
  el('rect',{x:cx-3.2,y:gY-3.8,width:1.8,height:1.5,fill:'#88ccee',stroke:'#3a1e08','stroke-width':'.24'})  // window
}

/* ─── CASTLE ─────────────────────────────────────────────────────────── */
function castle(cx, gY) {
  // Side towers
  el('rect',{x:cx-7,y:gY-10,width:4.5,height:10,fill:'#d8a840',stroke:'#5a3010','stroke-width':'.44'})
  el('rect',{x:cx+2.5,y:gY-10,width:4.5,height:10,fill:'#d8a840',stroke:'#5a3010','stroke-width':'.44'})
  // Main tower
  el('rect',{x:cx-3.2,y:gY-13.5,width:6.4,height:13.5,fill:'#e0b848',stroke:'#5a3010','stroke-width':'.50'})
  // Battlements
  ;[-2.4,-1.0,.4,1.8].forEach(ox=>
    el('rect',{x:cx+ox-.5,y:gY-14.8,width:1.0,height:1.4,fill:'#e0b848',stroke:'#5a3010','stroke-width':'.28'}))
  ;[-5.8,-4.4].forEach(ox=>
    el('rect',{x:cx+ox-.42,y:gY-11.2,width:.85,height:1.2,fill:'#d8a840',stroke:'#5a3010','stroke-width':'.26'}))
  ;[3.1,4.5].forEach(ox=>
    el('rect',{x:cx+ox-.42,y:gY-11.2,width:.85,height:1.2,fill:'#d8a840',stroke:'#5a3010','stroke-width':'.26'}))
  // Windows
  el('rect',{x:cx-1.5,y:gY-11,width:3,height:2.5,fill:'#88ccee',stroke:'#3a3010','stroke-width':'.3'})
  // Flags
  el('line',{x1:cx,y1:gY-14.8,x2:cx,y2:gY-18,stroke:'#5a3010','stroke-width':'.50'})
  el('polygon',{points:`${cx},${gY-18} ${cx+3.2},${gY-16.5} ${cx},${gY-15.2}`,fill:'#e02020',stroke:'#8a1010','stroke-width':'.24'})
  el('line',{x1:cx-4.8,y1:gY-10,x2:cx-4.8,y2:gY-13,stroke:'#5a3010','stroke-width':'.40'})
  el('polygon',{points:`${cx-4.8},${gY-13} ${cx-2.4},${gY-12} ${cx-4.8},${gY-11}`,fill:'#e02020',stroke:'#8a1010','stroke-width':'.22'})
  // Gate arch
  el('path',{d:`M ${cx-1.8},${gY} L ${cx-1.8},${gY-3.5} A 1.8,2.2,0,0,1,${cx+1.8},${gY-3.5} L ${cx+1.8},${gY} Z`,fill:'#5a3010'})
}

/* ══════════════════════════════════════════════════════════════════════
   ISLAND — layered terrain
   Rendering order creates the cliff illusion:
     Lower green → cliff face (brown) → middle plateau (green, covers cliff top)
     → cliff 2 face → upper plateau
══════════════════════════════════════════════════════════════════════ */

// Rocky outer rim
el('path',{
  d:`M 32,8 C 56,2 90,1 124,8 C 154,14 174,28 173,49
     C 172,68 160,82 140,89 C 120,96 98,97 75,93
     C 52,89 32,78 22,64 C 12,50 15,31 23,19
     C 27,12 29,9 32,8 Z`,
  fill:'#5a3010',opacity:'.70'
})
// Sandy beach
el('path',{
  d:`M 35,11 C 58,5 90,3 122,10 C 151,16 170,30 169,49
     C 168,68 156,80 137,87 C 118,94 98,95 76,91
     C 54,87 35,76 25,63 C 15,50 18,33 26,21
     C 29,14 32,12 35,11 Z`,
  fill:'#d4a438'
})
// Lower green base
el('path',{
  d:`M 38,14 C 61,8 90,6 120,13 C 149,20 166,33 165,50
     C 164,67 153,78 134,85 C 116,92 98,92 77,88
     C 57,84 39,73 29,61 C 20,50 22,34 31,23
     C 34,17 36,15 38,14 Z`,
  fill:'#58b010'
})

/* CLIFF 1 ── runs across island, separates lower floor from middle plateau */
el('path',{
  d:`M 22,63 C 44,62 70,61 98,60 C 122,59 144,59 164,61
     L 164,67 C 144,65 122,65 98,66 C 70,67 44,68 22,69 Z`,
  fill:'#a87028'
})
el('path',{d:`M 22,63 C 44,62 70,61 98,60 C 122,59 144,59 164,61`,
  fill:'none',stroke:'#c89840','stroke-width':'.60'})
el('path',{d:`M 22,69 C 44,68 70,67 98,66 C 122,65 144,65 164,67`,
  fill:'none',stroke:'#4a2808','stroke-width':'.72'})

// Middle plateau — bottom edge = cliff 1 top line
el('path',{
  d:`M 22,63 C 44,62 70,61 98,60 C 122,59 144,59 164,61
     C 167,50 166,36 158,24 C 146,13 124,10 102,11
     C 82,12 58,17 40,26 C 26,33 20,55 22,63 Z`,
  fill:'#58b010'
})

/* CLIFF 2 ── right section only, upper terrace */
el('path',{
  d:`M 64,44 C 84,42 108,40 130,38 C 144,37 156,38 165,40
     L 165,46 C 156,44 144,43 130,44 C 108,46 84,48 64,50 Z`,
  fill:'#a87028'
})
el('path',{d:`M 64,44 C 84,42 108,40 130,38 C 144,37 156,38 165,40`,
  fill:'none',stroke:'#c89840','stroke-width':'.60'})
el('path',{d:`M 64,50 C 84,48 108,46 130,44 C 144,43 156,44 165,46`,
  fill:'none',stroke:'#4a2808','stroke-width':'.72'})

// Upper plateau — bottom edge = cliff 2 top line
el('path',{
  d:`M 64,44 C 84,42 108,40 130,38 C 144,37 156,38 165,40
     C 168,30 166,19 158,13 C 146,8 124,7 104,9
     C 84,11 66,22 64,34 C 62,40 62,43 64,44 Z`,
  fill:'#58b010'
})

/* ═══════════════════════════════════════════════
   HILLS — back to front
   Left = big hero cluster | right = scattered
═══════════════════════════════════════════════ */

// Upper plateau (behind right forest)
hill(82,  40,  7,  5)
hill(94,  38,  8,  6)
hill(74,  42,  6,  4)
hill(105, 42,  6,  4)

// LEFT HERO CLUSTER — fat mound hills, wide not tall
hill(22,  67,  8,  5)
hill(34,  65, 10,  7)   // biggest hill on map
hill(26,  62,  8,  5)
hill(44,  65,  9,  6)
hill(54,  63,  7,  5)
hill(18,  70,  7,  5)

// Right side scattered
hill(112, 62,  6,  4)
hill(122, 60,  7,  5)

// Lower standalone hills (level 1 / foreground) — bigger so they read
hill(24,  84, 11,  7)
hill(40,  86,  9,  6)
hill(148, 78, 11,  7)
hill(164, 83,  9,  6)

/* ═══════════════════════════════════════════════
   TREES
═══════════════════════════════════════════════ */

// DENSE RIGHT FOREST — tightly packed, ~5.5 unit grid, trees nearly touching
;[
  // row 1 (back/top)
  [122,24,3.0],[128,22,3.0],[134,20,3.0],[140,19,3.0],[146,20,3.0],[152,22,3.0],[158,24,3.0],[163,27,2.8],
  // row 2
  [120,30,3.0],[126,28,3.0],[132,26,3.0],[138,25,3.0],[144,25,3.0],[150,27,3.0],[156,29,3.0],[162,32,2.8],
  // row 3
  [124,36,3.0],[130,34,3.0],[136,32,3.0],[142,31,3.0],[148,32,3.0],[154,34,3.0],[160,37,2.8],
  // row 4
  [122,42,3.0],[128,40,3.0],[134,38,3.0],[140,37,3.0],[146,38,3.0],[152,40,3.0],[158,43,2.8],
  // row 5 (front/bottom edge of forest)
  [126,48,2.8],[132,46,2.8],[138,44,2.8],[144,43,2.8],[150,45,2.8],[156,47,2.6]
].forEach(([cx,cy,r]) => tree(cx,cy,r))

// Lower center bush cluster — small tight group like reference
;[[92,84,2.4],[97,82,2.6],[103,84,2.4],[109,83,2.4],[115,82,2.2]].forEach(([cx,cy,r])=>tree(cx,cy,r))

// Mid-island scattered (sparse)
tree(60, 70, 2.6)
tree(70, 68, 2.6)
tree(78, 72, 2.4)

// Near house lower-left
tree(32, 79, 2.6)
tree(18, 83, 2.8)

/* ═══════════════════════════════════════════════
   LANDMARKS
═══════════════════════════════════════════════ */
house(25, 77)         // lower-left — Contact landmark
castle(148, 40)       // upper-right plateau — Projects landmark

/* ═══════════════════════════════════════════════
   PATH  (nodeConfig x * 1.78, y unchanged)
   Contact(14,63) → Experience(48,46) → Home(89,57)
   → Projects(130,39) → Awards(164,53)
═══════════════════════════════════════════════ */
const pathD = `M 14,63 C 18,52 32,42 48,46 C 64,50 75,60 89,57 C 103,54 116,44 130,39 C 144,44 155,52 164,53`
el('path',{d:pathD,fill:'none',stroke:'#7a5010','stroke-width':'3.2','stroke-linecap':'round','stroke-linejoin':'round'})
el('path',{d:pathD,fill:'none',stroke:'#d4a438','stroke-width':'2.4','stroke-linecap':'round','stroke-linejoin':'round'})
el('path',{d:pathD,fill:'none',stroke:'#ecc060','stroke-width':'1.0','stroke-linecap':'round','stroke-dasharray':'.01 4.5'})

/* ═══════════════════════════════════════════════
   NODES
═══════════════════════════════════════════════ */
;[
  {x:14,  y:63, c:'#e74c3c', label:'Contact'},
  {x:48,  y:46, c:'#e67e22', label:'Experience'},
  {x:89,  y:57, c:'#f1c40f', label:'Home'},
  {x:130, y:39, c:'#2ecc71', label:'Projects'},
  {x:164, y:53, c:'#9b59b6', label:'Awards'},
].forEach(({x,y,c,label})=>{
  el('circle',{cx:x,cy:y,r:'2.8',fill:c,stroke:'#000','stroke-width':'.65'})
  el('circle',{cx:x,cy:y,r:'1.1',fill:'white'})
  const t=el('text',{x,y:y+4.8,'text-anchor':'middle','font-family':'monospace',
    'font-size':'2.1',fill:'white',stroke:'#000','stroke-width':'.55','paint-order':'stroke'},svg)
  t.textContent=label
})
</script>
</body>
</html>
